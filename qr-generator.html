<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QR Code Generator - SmartTools Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 500px;
  margin: auto;
  background: #1f2937;
  padding: 20px;
  border-radius: 10px;
}

input {
  width: 90%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
}

button {
  padding: 10px 15px;
  border: none;
  border-radius: 8px;
  background: #2563eb;
  color: white;
  cursor: pointer;
  margin-top: 10px;
}

button:hover {
  background: #1d4ed8;
}

#qrcode {
  margin-top: 20px;
}
</style>

</head>
<body>

<div class="container">

  <h2>QR Code Generator</h2>

  <input type="text" id="text" placeholder="Enter text or URL">

  <button onclick="generateQR()">Generate QR Code</button>

  <div id="qrcode"></div>

</div>

<!-- QR Code Library -->
<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>

<script>
function generateQR() {
  let container = document.getElementById("qrcode");
  container.innerHTML = "";

  let text = document.getElementById("text").value;

  if(text.trim() === "") {
    alert("Please enter text or URL");
    return;
  }

  new QRCode(container, {
    text: text,
    width: 200,
    height: 200
  });
}
</script>

</body>
</html>
